{% extends "base.html" %}
{% load i18n crispy_forms_tags %}

{% block title %}{% trans "Contact" %} - TutoringApp{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <h1 class="mb-4">{% trans "Contact Us" %}</h1>
        <div class="card p-4">
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-send me-2"></i>{% trans "Send Message" %}
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
